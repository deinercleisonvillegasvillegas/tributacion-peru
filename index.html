table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#003087;color:white;padding:8px;text-align:left}
td{padding:8px;border-bottom:1px solid #eee}
tr:nth-child(even){background:#f5f5f5}
.badge{display:inline-block;padding:3px 8px;border-radius:10px;font-size:11px;font-weight:bold}
.badge-verde{background:#e8f5e9;color:#0D7A3E}
.badge-rojo{background:#fdecea;color:#C8102E}
.badge-azul{background:#e8f0fb;color:#003087}
